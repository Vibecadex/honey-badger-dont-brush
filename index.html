<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Honey Badger Don't Brush</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #120d0a;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    position: relative;
  }
  body::before {
    content: "";
    position: fixed;
    inset: -28px;
    background:
      linear-gradient(180deg, rgba(18,11,8,0.12), rgba(18,11,8,0.68)),
      url("assets/background.jpg") center center / cover no-repeat;
    filter: blur(18px) saturate(0.9) brightness(0.56);
    transform: scale(1.06);
    z-index: -2;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 50% 34%, rgba(255, 206, 140, 0.18), transparent 34%),
      radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0), rgba(0,0,0,0.46) 78%);
    z-index: -1;
    pointer-events: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #frame {
    position: relative;
    width: fit-content;
    height: fit-content;
    line-height: 0;
  }
  canvas {
    background: #2a3d2a;
    display: block;
    touch-action: none;
    cursor: none;
  }
  #hud {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 16px;
    line-height: normal;
    pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.7);
  }
  #hud > div {
    transform-origin: center top;
    will-change: transform, filter;
    background: rgba(20, 12, 8, 0.48);
    border: 1px solid rgba(255, 225, 180, 0.1);
    box-shadow: 0 10px 28px rgba(0,0,0,0.24);
    border-radius: 999px;
    padding: 6px 12px;
    backdrop-filter: blur(8px);
  }
  #hud span {
    display: inline-block;
    transform-origin: center center;
    will-change: transform, filter;
  }
  #overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.65);
    flex-direction: column;
    gap: 20px;
    padding: 40px 28px;
    box-sizing: border-box;
    z-index: 10;
    backdrop-filter: blur(8px);
  }
  #overlay.show {
    display: flex;
    animation: overlayPop 260ms cubic-bezier(0.2, 0.9, 0.25, 1.15);
  }
  /* Bite ending: slow fade-in over an already-black canvas. Override the
     quick pop so the Bitten title / score emerge gently. */
  #overlay.show.bitten {
    animation: overlayBittenFade 900ms ease-out;
  }
  #overlay::before {
    content: "";
    position: absolute;
    width: min(640px, calc(100vw - 32px));
    height: min(400px, calc(100vh - 80px));
    border-radius: 28px;
    background:
      linear-gradient(180deg, rgba(38, 24, 16, 0.68), rgba(18, 12, 8, 0.5));
    border: 1px solid rgba(255, 225, 180, 0.1);
    box-shadow: 0 26px 80px rgba(0,0,0,0.36);
  }
  #overlay > * {
    position: relative;
    z-index: 1;
  }
  #overlay h1 {
    margin: 0;
    padding: 0 20px;
    font-size: clamp(32px, 6.4vw, 64px);
    line-height: 1.1;
    text-align: center;
    max-width: min(600px, calc(100vw - 48px));
    text-shadow: 0 10px 28px rgba(0,0,0,0.35);
  }
  #overlay p {
    margin: 0;
    padding: 0 20px;
    font-size: clamp(16px, 2.6vw, 22px);
    opacity: 0.85;
    text-shadow: 0 6px 18px rgba(0,0,0,0.3);
    max-width: min(540px, calc(100vw - 56px));
    text-align: center;
    line-height: 1.4;
  }
  /* Primary CTA — Start. Scoped by id so it doesn't bleed into the
     Settings button or the difficulty pills inside #overlay. */
  #overlay #startBtn {
    background: #e8b34a;
    color: #1a1a1a;
    border: none;
    padding: 12px 28px;
    font-size: 18px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 12px 28px rgba(232,179,74,0.28);
    transition: transform 100ms ease, box-shadow 100ms ease, filter 100ms ease, background 100ms ease;
  }
  #overlay #startBtn:hover {
    background: #f3c15b;
    transform: translateY(-1px) scale(1.04);
    box-shadow: 0 16px 34px rgba(243,193,91,0.36);
  }
  #overlay #startBtn:active {
    transform: translateY(1px) scale(0.98);
    box-shadow: 0 7px 16px rgba(232,179,74,0.22);
  }
  /* Start + Settings share a row. */
  #overlayButtons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  /* Secondary action — Change Mode — de-emphasized vs. Start/Try Again. */
  #changeModeBtn {
    background: rgba(255, 225, 180, 0.1);
    color: #f3d9a7;
    border: 1px solid rgba(255, 225, 180, 0.28);
    border-radius: 6px;
    padding: 12px 28px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(0,0,0,0.32);
    transition: transform 100ms ease, box-shadow 100ms ease, background 100ms ease, color 100ms ease;
  }
  #changeModeBtn:hover {
    background: rgba(255, 225, 180, 0.18);
    color: #fff;
    transform: translateY(-1px) scale(1.03);
    box-shadow: 0 12px 28px rgba(0,0,0,0.38);
  }
  #changeModeBtn:active {
    transform: translateY(1px) scale(0.98);
  }
  #settingsPanel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
    padding: 14px 20px 12px;
    background: rgba(20, 12, 8, 0.55);
    border: 1px solid rgba(255, 225, 180, 0.14);
    border-radius: 14px;
    min-width: min(360px, calc(100vw - 64px));
    animation: overlayBittenFade 220ms ease-out;
  }
  #settingsPanel[hidden] { display: none; }
  .settings-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.7;
  }
  #difficultyOptions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .diff-opt {
    background: rgba(255, 225, 180, 0.08);
    color: #f3d9a7;
    border: 1px solid rgba(255, 225, 180, 0.22);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: transform 90ms ease, background 90ms ease, color 90ms ease, border-color 90ms ease;
  }
  .diff-opt:hover {
    background: rgba(255, 225, 180, 0.2);
    color: #fff;
    transform: translateY(-1px);
  }
  .diff-opt.active {
    background: #e8b34a;
    color: #1a1a1a;
    border-color: #f3c15b;
    box-shadow: 0 6px 18px rgba(232,179,74,0.32);
  }
  /* Locked "future mode" pill — hints at a third option coming later
     without being interactable. Subdued look, not-allowed cursor,
     small footnote glyph to set it apart from shipped modes. */
  .diff-opt.locked {
    background: rgba(255, 225, 180, 0.04);
    color: rgba(243, 217, 167, 0.45);
    border-style: dashed;
    border-color: rgba(255, 225, 180, 0.15);
    cursor: not-allowed;
  }
  .diff-opt.locked::after {
    content: " •";
    opacity: 0.55;
    margin-left: 2px;
  }
  .diff-opt.locked:hover {
    background: rgba(255, 225, 180, 0.08);
    color: rgba(243, 217, 167, 0.6);
    transform: none;
  }
  .settings-hint {
    font-size: 11px;
    opacity: 0.6;
    text-align: center;
    line-height: 1.4;
  }
  .settings-hint kbd {
    background: rgba(255,255,255,0.12);
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.18);
    font-family: inherit;
  }
  .settings-hint code {
    background: rgba(0,0,0,0.32);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 10.5px;
  }
  /* Hidden-ish dev toggle — small, muted, sits below the hint so casual
     players are unlikely to bother, but anyone play-testing can flip it. */
  .settings-micro {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 2px 6px;
    margin-top: 2px;
    font-size: 10.5px;
    color: rgba(255, 225, 180, 0.55);
    cursor: pointer;
    user-select: none;
  }
  .settings-micro:hover { color: rgba(255, 225, 180, 0.85); }
  .settings-micro em { font-style: normal; opacity: 0.7; }
  .settings-micro input[type="checkbox"] {
    width: 12px;
    height: 12px;
    accent-color: #e8b34a;
    margin: 0;
  }
  @keyframes overlayPop {
    0% {
      opacity: 0;
      transform: scale(0.94);
    }
    65% {
      opacity: 1;
      transform: scale(1.02);
    }
    100% {
      opacity: 1;
      transform: scale(1);
    }
  }
  @keyframes overlayBittenFade {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
  @media (max-width: 700px) {
    #hud {
      font-size: 14px;
      top: 10px;
      left: 10px;
      right: 10px;
    }
    #hud > div {
      padding: 5px 10px;
    }
    #overlay::before {
      width: calc(100vw - 24px);
      height: min(340px, calc(100vh - 100px));
    }
    #overlay h1 {
      padding: 0 16px;
    }
    #overlay p {
      padding: 0 16px;
    }
  }
</style>
</head>
<body>
  <div id="wrap">
    <div id="frame">
      <canvas id="game" width="800" height="600"></canvas>
      <div id="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Goal: <span id="goal">???</span></div>
        <div>Best: <span id="best">0</span></div>
      </div>
    </div>
  </div>
  <div id="overlay">
    <h1 id="overTitle">Honey Badger Don't Brush</h1>
    <p id="overSub">Brush gently. Stop when he looks at you.</p>
    <div id="overlayButtons">
      <button id="startBtn" aria-expanded="false" aria-controls="settingsPanel" data-action="open-picker">Start</button>
      <button id="changeModeBtn" type="button" aria-controls="settingsPanel" hidden>Change Mode</button>
    </div>
    <div id="settingsPanel" hidden>
      <div class="settings-label">Pick your groomer</div>
      <div id="skinOptions" role="radiogroup" aria-label="Groomer"></div>
      <div class="settings-hint">Difficulty scales naturally as you play. Pass <code>?skin=cat</code> in the URL to skip the picker.</div>
      <label id="scalerToggle" class="settings-micro">
        <input type="checkbox" id="scalerToggleCb" />
        <span>Show scaling overlay <em>(dev)</em></span>
      </label>
    </div>
  </div>

  <script src="game.js"></script>

  <!--
    Vibecade backend integration.

    Three scripts load in order:
      1. Supabase UMD bundle (prerequisite for the SDK)
      2. Self-hosted sdk.js — build from the vibecade repo:
           pnpm install && pnpm -F @vibecade/sdk build
           cp packages/sdk/dist/sdk.js /path/to/this-repo/sdk.js
      3. Init + (optional) smoke test.

    If sdk.js hasn't been dropped in yet, init quietly no-ops and the
    game continues normally. submitScore / trackEvent calls inside
    game.js are vc?.-guarded so they skip when Vibecade isn't ready.

    To verify connectivity end-to-end, load the game with ?vc_smoke=1 —
    submits a test score of 1 + a "smoke-test" event, then prints the
    top-5 leaderboard. Safe to commit alongside the prod anon key;
    Supabase RLS + JWT are the real access control per TODO.md.
  -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./sdk.js"></script>
  <script>
    (() => {
      // --- Config ---------------------------------------------------
      // Dev API key — throwaway for smoke testing per Vibecade setup
      // notes. Rotate + inject-at-build-time before shipping for real.
      const GAME_ID = 'honey-badger';
      const API_KEY = 'pk_dev_honeybadger_a1b2c3d4e5f6g7h8';
      const API_URL = 'https://kyhrmknwykrcdxkbrkiz.supabase.co';
      // Grab from Vercel (Settings → Env Vars → VITE_SUPABASE_ANON_KEY)
      // or Supabase (Project Settings → API → anon public key). Safe
      // to commit; replace the placeholder below.
      const ANON_KEY = '<PASTE_PROD_ANON_KEY>';

      const placeholderKey = ANON_KEY.charAt(0) === '<';
      if (typeof Vibecade !== 'function') {
        console.warn('[vibecade] sdk.js not loaded yet — integration inert. ' +
          'Build it from the vibecade repo and drop it in next to index.html.');
        return;
      }
      if (placeholderKey) {
        console.warn('[vibecade] anonKey placeholder unset in index.html — ' +
          'integration inert until you paste the real key.');
        return;
      }

      const vc = new Vibecade({
        gameId: GAME_ID,
        apiKey: API_KEY,
        apiUrl: API_URL,
        anonKey: ANON_KEY,
        debug: true,
      });
      // Expose on window so game.js can fire-and-forget submit/track calls.
      window.vc = vc;

      (async () => {
        try {
          await vc.init();
          console.log('[vibecade] init ok; player =', vc.getPlayer());

          // Smoke-test path: only runs with ?vc_smoke=1 in the URL so
          // every page refresh doesn't pollute the leaderboard with
          // a score of 1.
          const url = new URLSearchParams(location.search);
          if (url.get('vc_smoke') === '1') {
            vc.trackEvent('smoke-test', { source: 'honey-badger' });
            const score = await vc.submitScore({ score: 1 });
            console.log('[vibecade] smoke score submitted, rank =', score.rank);
            const top = await vc.getLeaderboard({ limit: 5 });
            console.log('[vibecade] leaderboard top-5', top);
          }
        } catch (err) {
          console.error('[vibecade]', err && err.code, err && err.message, err);
        }
      })();
    })();
  </script>
</body>
</html>
