<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Tame Badger</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1a1a1a;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    background: #2a3d2a;
    display: block;
    touch-action: none;
    cursor: none;
  }
  #hud {
    position: fixed;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 18px;
    pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.7);
  }
  #state {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    opacity: 0.6;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,0.7);
  }
  #overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.65);
    flex-direction: column;
    gap: 16px;
    z-index: 10;
  }
  #overlay.show { display: flex; }
  #overlay h1 { margin: 0; font-size: 42px; }
  #overlay p { margin: 0; font-size: 18px; opacity: 0.85; }
  #overlay button {
    background: #e8b34a;
    color: #1a1a1a;
    border: none;
    padding: 12px 28px;
    font-size: 18px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
  }
  #overlay button:hover { background: #f3c15b; }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="800" height="600"></canvas>
  </div>
  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Goal: <span id="goal">???</span></div>
    <div>Best: <span id="best">0</span></div>
  </div>
  <div id="state"></div>
  <div id="overlay">
    <h1 id="overTitle">Tame Badger</h1>
    <p id="overSub">Brush the badger. Stop when it looks at you.</p>
    <button id="startBtn">Start</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
